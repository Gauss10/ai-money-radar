name: daily-update

on:
  schedule:
    - cron: '30 22 * * *'   # UTC 22:30 = 北京时间早上 06:30
    - cron: '0 2 * * *'     # UTC 02:00 = 北京时间上午 10:00；补齐延迟发布的 OpenRouter 日榜
  workflow_dispatch: {}      # 手动触发按钮
  push:
    branches: [main]         # 手动改数据/代码 push 后立即重新部署

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-signal.txt

      # 定时/手动触发时抓数据；普通 push 只重新部署，不抓数
      - name: Update data
        if: github.event_name != 'push'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: |
          cd scripts
          python update_all.py

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data arr-model/arr_checkpoints.json feeds/feed-x.json feeds/feed-podcasts.json feeds/feed-arxiv.json
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%F)"
          git push

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # 首次运行自动启用 GitHub Pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
